name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Upgraded to v5 to natively support Node 24 and eliminate the deprecation error
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysqlnd

      - name: Install Composer Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-progress

      # Upgraded to v4.4.1 which resolves the Node 24 runtime deprecation
      - name: Deploy Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.1
        with:
          server: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/drdmedia.site/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/storage/logs/**
            .env